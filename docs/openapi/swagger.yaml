info:
  contact:
    name: OCTO API Team
    url: https://github.com/Mininglamp-OSS/octo-marketplace
  description: Skill and MCP marketplace API for OCTO.
  title: Octo Marketplace API
  version: 1.0.0
openapi: 3.1.0
paths:
  /admin/mcps:
    get:
      description: List system-visible MCP servers using offset pagination.
      operationId: admin_mcp.list
      parameters:
      - description: Search keyword
        in: query
        name: keyword
        schema:
          type: string
      - description: Category key
        in: query
        name: category
        schema:
          type: string
      - description: Transport filters
        in: query
        name: transport
        schema:
          items:
            type: string
          type: array
      - description: Verification filters
        in: query
        name: verification_status
        schema:
          items:
            type: string
          type: array
      - description: Tag filters
        in: query
        name: tag
        schema:
          items:
            type: string
          type: array
      - description: 'Sort: relevance, updated, verified'
        in: query
        name: sort
        schema:
          type: string
      - description: Page number, default 1
        in: query
        name: page
        schema:
          type: integer
      - description: Page size, default 20, max 100
        in: query
        name: page_size
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_Mininglamp-OSS_octo-marketplace_internal_api_response.OffsetList-github_com_Mininglamp-OSS_octo-marketplace_internal_model_ListItem'
          description: OK
        "401":
          content:
