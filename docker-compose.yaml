# DEV ONLY — for local octo-marketplace development.
#
# Copy .env.example to .env to override local credentials. Production deployment
# must provide rotated secrets and managed persistence through the OCTO
# deployment repository.
services:
  marketplace-service:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "127.0.0.1:8092:8092"
    environment:
      APP_ENV: "dev"
      MYSQL_DSN: "marketplace:marketplace@tcp(mysql:3306)/octo_marketplace?charset=utf8mb4&parseTime=true"
      API_PORT: "8092"
      PUBLIC_BASE_URL: "http://127.0.0.1:8092"
      AUTH_ENABLED: "false"
      DEV_AUTH_UID: "dev-user"
      DEV_AUTH_NAME: "Developer"
      DEV_SPACE_ID: "dev-space"
      REDIS_URL: "redis://redis:6379/0"
      STORAGE_DRIVER: "oss"
      OSS_ENDPOINT: "http://minio:9000"
      OSS_BUCKET: "octo-marketplace"
      OSS_ACCESS_KEY: "${MINIO_ROOT_USER:-octo-local-admin}"
      OSS_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-octo-local-dev-password}"
      OSS_REGION: "us-east-1"
      OSS_PATH_STYLE: "true"
      OSS_PUBLIC_ENDPOINT: "http://127.0.0.1:29000"
      OSS_PUBLIC_PATH_STYLE: "true"
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,172.28.0.0/24,minio,mysql,redis,marketplace-service"
      no_proxy: "localhost,127.0.0.1,172.28.0.0/24,minio,mysql,redis,marketplace-service"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - default

  mysql:
    image: docker.m.daocloud.io/mysql:8.0
    environment:
      MYSQL_DATABASE: octo_marketplace
      MYSQL_USER: marketplace
      MYSQL_PASSWORD: marketplace
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: docker.io/redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-octo-local-admin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-octo-local-dev-password}"
      MINIO_API_CORS_ALLOW_ORIGIN: "http://127.0.0.1:3000,http://localhost:3000,http://127.0.0.1:3100,http://localhost:3100,http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:8092,http://localhost:8092"
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,minio,mysql,marketplace-service"
      no_proxy: "localhost,127.0.0.1,minio,mysql,marketplace-service"
    volumes:
      - miniodata:/data
    ports:
      - "127.0.0.1:29000:9000"
      - "127.0.0.1:29001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-octo-local-admin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-octo-local-dev-password}"
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,minio,mysql,marketplace-service"
      no_proxy: "localhost,127.0.0.1,minio,mysql,marketplace-service"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing local/octo-marketplace
        mc anonymous set download local/octo-marketplace
    networks:
      - default

volumes:
  mysqldata:
  miniodata:
  redisdata:
